name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify migrations match schema
        env:
          # drizzle-kit generate diffs the schema against drizzle/meta/_journal.json
          # — it does not connect. The dummy URL only satisfies the config's
          # non-null assertion.
          DATABASE_URL: postgres://fake:fake@localhost:5432/fake
        run: |
          pnpm db:generate
          if ! git diff --exit-code drizzle/; then
            echo "::error::Schema in src/db/schema.ts is out of sync with drizzle/. Run 'pnpm db:generate' locally and commit the result."
            exit 1
          fi
