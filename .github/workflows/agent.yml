name: Agent

on:
  workflow_dispatch:
    inputs:
      title:
        description: Feature title
        required: true
        type: string
      description:
        description: Feature description
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:

      - name: Wait for prior agent runs
        uses: ahmadnassri/action-workflow-queue@v1
        with:
          timeout: 7200000

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name "agent[bot]"
          git config user.email "agent[bot]@users.noreply.github.com"

      - name: Create feature branch
        id: branch
        env:
          TITLE: ${{ inputs.title }}
        run: |
          # kebab-case the title, drop non-alphanumerics, cap at 40 chars
          SLUG=$(printf '%s' "$TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-40 \
            | sed -E 's/-+$//')
          BRANCH="feat/${SLUG}-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          claude_args: |
            --max-turns 60
            --model claude-opus-4-7
            --permission-mode acceptEdits
            --allowedTools Read,Write,Edit,Bash,Glob,Grep,WebFetch,Task,TodoWrite
          prompt: |
            You are an autonomous coding agent implementing a feature in this repo.

            ## Feature

            **Title:** ${{ inputs.title }}

            **Description:** ${{ inputs.description }}

            ## Rules

            1. Read `AGENTS.md` and `GOAL.md` before writing any code. The
               feature exists to move the product closer to the goal — keep
               that framing in mind when making design choices.
            2. Build the feature properly. New routes, new components, new
               schema migrations, new dependencies, new server endpoints, and
               new third-party integrations are all fair game when the feature
               calls for them. The only things to
               avoid are unrelated refactors and changes outside the feature's
               scope.
            3. Add Vitest tests colocated as `*.test.ts` next to the file under
               test. Cover the happy path and at least one edge case.
            4. Before committing — and AFTER your final edit to any file — run
               all four checks below from the repo root. Every one must pass on
               the exact tree you are about to commit. If you edit anything
               afterward (even a test file), re-run them.
               - `pnpm lint`
               - `pnpm test`
               - `pnpm exec tsc --noEmit`
               - `pnpm build`
               Do not claim a check passed without actually invoking it in this
               session. Do not suppress lint rules (no `eslint-disable`, no
               `any` to dodge type errors) — fix the underlying issue instead.
            5. Commit your work on the current branch (already created for you:
               `${{ steps.branch.outputs.branch }}`). Use a clear commit message.
            6. Do not push or open a PR — the workflow will do that after you exit.

            If you cannot make all four checks pass, leave the working tree dirty
            and exit. The workflow will fail loudly rather than open a broken PR.

      - name: Upload Claude transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-transcript-${{ github.run_id }}
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: ignore

      - name: Verify checks pass
        run: |
          pnpm lint
          pnpm test
          pnpm exec tsc --noEmit
          pnpm build

      - name: Push branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push -u "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "${{ steps.branch.outputs.branch }}"

      - name: Open PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: ${{ inputs.title }}
          DESCRIPTION: ${{ inputs.description }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          BODY=$(cat <<EOF
          ## Feature

          $DESCRIPTION

          ---

          Opened automatically by the agent workflow.

          <!-- agent-run: ${{ github.run_id }} -->
          EOF
          )
          URL=$(gh pr create --base main --head "$BRANCH" --title "$TITLE" --body "$BODY")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: vars.AUTO_MERGE == 'TRUE'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ steps.pr.outputs.url }}" --auto --squash --delete-branch
